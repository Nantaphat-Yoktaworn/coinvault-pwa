<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no" />
  <title>CoinVault</title>
  <meta name="theme-color" content="#0d0b1e" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CoinVault" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/favicon-64.png" />

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>

  <header class="app-header">
    <h1 id="view-title">Money</h1>
    <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙︎</button>
  </header>

  <main id="view"></main>

  <nav class="tab-bar" id="tab-bar">
    <button class="tab" data-view="money">
      <span class="tab-ico">฿</span><span class="tab-label">Money</span>
    </button>
    <button class="tab" data-view="stats">
      <span class="tab-ico">▦</span><span class="tab-label">Stats</span>
    </button>
  </nav>

  <!-- Bottom sheet host -->
  <div id="sheet-root"></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
